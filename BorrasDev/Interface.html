<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Interface1.css">
    <script type="module" src="firebaseauth.js"></script>
</head>
<body>



  <div class="container" id="signIn">
        <h1 class="form-title">WELCOME!</h1>
        
        <form method="post" action="">
          <div id="signInMessage" class="messageDiv" style="display:none;"></div>

          <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email"  id="email" placeholder="" required>
              <label for="email">Email</label>
          </div>
          <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="" required>
              <label for="password">Password</label>
              <i class="fas fa-eye toggle-password" id="toggleSignInPassword"></i>
          </div>
         <button  class="btn"  id="submitSignIn">Sign In</button>
        </form>

        <div class="qr-section">
            <h2>QR PC Status</h2>
            <p class="qr-text">Generate QR code to scan and see PC status.</p>

            <div class="qr-generator">
                <h3>Generate PC QR</h3>
                <div class="generator-controls">
                    <select id="pcSelect" class="qr-select">
                        <option value="PC-01">PC-01</option>
                        <option value="PC-02">PC-02</option>
                        <option value="PC-03">PC-03</option>
                        <option value="PC-04">PC-04</option>
                    </select>
                    <button type="button" id="generateQrButton" class="btn">Generate QR</button>
                </div>
                <div class="qr-output" id="qrOutput" style="display:none;">
                    <canvas id="qrCodeCanvas"></canvas>
                    <div class="qr-output-label">Scan this QR with your phone.</div>
                </div>
            </div>
        </div>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
      <script src="Interface1.js"></script>
      
      <!-- Loading Overlay -->
      <div class="loading-overlay">
          <div class="loading-spinner"></div>
          <div class="loading-text">Logging in...</div>
      </div>
</body>
</html>
